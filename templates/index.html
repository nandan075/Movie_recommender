<!DOCTYPE html>
<html>
<head>
<title>Movie Recommender</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#2f6f57,#8fd3b6);
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

select,button{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
font-size:16px;
}

button{
background:#184d3c;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<div class="card">

<h2>🎬 Movie Recommender</h2>

<form method="POST">

<select name="movie" required>
<option disabled selected>
{{ selected_movie if selected_movie else "Select a movie" }}
</option>

{% for movie in movies %}
<option value="{{movie}}">{{movie}}</option>
{% endfor %}
</select>

<button type="submit">Get Recommendations</button>

</form>

{% if recommendations %}
<div class="result">
<h3>Recommended Movies</h3>
<ul>
{% for movie in recommendations %}
<li>{{movie}}</li>
{% endfor %}
</ul>
</div>
{% endif %}

</div>
</body>
</html>
